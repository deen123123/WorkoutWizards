{% extends "authenticated-base.html" %}

{% block subpage_content %}
<h1>Exercises</h1>

<form method="get" action="/api/exercises">
    <input type="text" name="muscle" placeholder="Enter muscle (e.g. chest)" value="{{ muscle or '' }}">
    <button type="submit">Search</button>
</form>

<table border="1" style="margin-top:20px;">
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Muscle</th>
            <th>Difficulty</th>
        </tr>
    </thead>
    <tbody>
        {% for ex in exercise_db %}
        <tr>
            
            <td>{{ ex.name }}</td>
            <td>{{ ex.type }}</td>
            <td>{{ ex.muscle }}</td>
            <td>{{ ex.difficulty }}</td>
           
         <td><!--MAKE THE ADDWORKOUT BUTTON FUNCTIONAL-->
        
      <td>
    <button type="button" onclick="addWorkout(
        '{{ ex.id }}',
        '{{ ex.name }}',
        '{{ ex.type }}',
        '{{ ex.muscle }}',
        '{{ ex.difficulty }}'
    )">
        Add Workout
    </button>
</td>
        </td>
    
        </tr>
        {% endfor %}
    </tbody>
</table>
    <div id="exerciseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; padding:20px; margin:100px auto; width:300px;">
        
        <form method="POST" action="/add_exercise/">
            
            <input type="hidden" name="exercise_id" id="modal_exercise_id">
            <input type="hidden" name="routine_id" value="{{ selected_routine_id }}">
            <input type="hidden" name="name" id="modal_name">
            <input type="hidden" name="type" id="modal_type">
            <input type="hidden" name="muscle" id="modal_muscle">
            <input type="hidden" name="difficulty" id="modal_difficulty">

            <p id="modal_display"></p>

            <button type="submit">Confirm</button>
            <button type="button" onclick="closeModal()">Cancel</button>
        </form>

    </div>
</div>
    </div>
   <script>
function addWorkout(id, name, type, muscle, difficulty) {
    let routine_id = prompt("Enter your Routine ID:");

    if (!routine_id) {
        return; // user cancelled
    }

    // create form dynamically
    let form = document.createElement("form");
    form.method = "POST";
    form.action = "/add_exercise/";

    function addField(name, value) {
        let input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
    }

    addField("routine_id", routine_id);
    addField("exercise_id", id);
    addField("name", name);
    addField("type", type);
    addField("muscle", muscle);
    addField("difficulty", difficulty);

    document.body.appendChild(form);
    form.submit();
}
</script>
{% endblock %}
